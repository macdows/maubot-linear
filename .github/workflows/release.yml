name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build plugin
        run: make build

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: linear_bot.mbp
